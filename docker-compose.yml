version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: leaderboard-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: leaderboard-api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  redis-data:
